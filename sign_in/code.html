<body class="bg-surface min-h-screen flex flex-col justify-center items-center px-margin-mobile">
<!-- Subtle Background Element (Institutional Transparency Vibe) -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-3xl"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[440px] animate-fade-in">
<!-- Header Branding (Suppressing Navigation for Transactional Focus) -->
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[40px]" style="font-variation-settings: 'FILL' 1;">verified</span>
<h1 class="text-headline-lg font-headline-lg text-primary tracking-tight">Verix</h1>
</div>
<h2 class="text-headline-md font-headline-md text-on-tertiary-fixed-variant">Sign in to Verix</h2>
<p class="text-body-md font-body-md text-on-surface-variant mt-2">Institutional-grade verification for global impact.</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-8 md:p-10 rounded-xl shadow-sm">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline rounded-lg text-body-md font-body-md transition-all" id="email" name="email" placeholder="name@organization.gov" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface" for="password">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline rounded-lg text-body-md font-body-md transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline rounded focus:ring-primary" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 text-label-md font-label-md text-on-surface-variant" for="remember">Remember this device for 30 days</label>
</div>
<!-- Primary Sign In Button -->
<button class="w-full py-3 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all shadow-md flex justify-center items-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm font-label-sm uppercase">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Button -->
<button class="w-full py-3 bg-white border border-outline text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-3">

</p>

<a class="text-label-md font-label-md hover:text-secondary transition-colors" href="#">Terms</a>
<a class="text-label-md font-label-md hover:text-secondary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#006a36';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '';
            });
        });

        // Form submission animation mock
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
                // Normally redirect here
            }, 1500);
        });
    </script>
